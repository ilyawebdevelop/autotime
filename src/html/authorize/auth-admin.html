<section class="sect pt-32">
  <div class="container">
    <h3 class="mb-2 text-center">Вход</h3>
    <div class="d-flex flex-column mb-32">
      <div class="color-grey-blue text-center fz-14 mx-auto fw-medium">
        для Сотрудников
      </div>
    </div>
    <form class="form" action="#">
      <div class="mb-3 form-floating">
        <input id="auth-email" type="email" class="formInput form-control" placeholder="Email">
        <label for="auth-email">Email</label>
      </div>
      <div class="mb-3 form-floating">
        <input id="auth-password" type="password" class="formInput form-control-password form-control"
          placeholder="Пароль">
        <label for="auth-password">Пароль</label>
        <button class="togglePasswordBtn" type="button"> </button>
      </div>
      <button class="button button--yellow w-100 text-uppercase mb-32 formBtn" disabled>
        войти
      </button>
    </form>
  </div>
</section>
