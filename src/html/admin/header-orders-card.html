<header class="header-writer bg--white d-flex">
  <div class="sidebar-logo">
    <a href="#" class="header-writer-logo">
      <img class="d-none d-xl-block" src="@img/admin/logo/logo.svg" alt="logo">
      <img class="d-block d-xl-none" src="@img/favicon.png" alt="logo">
    </a>
  </div>
  <div class="header-title">
    <div class="d-flex align-items-center justify-content-between gap-2 gap-sm-4 w-100 flex-wrap">

      <div class="d-flex align-items-center gap-10">
        <a href="#" class="prev-link">
          <img src="@img/icons/arrow-left.svg" alt="icon">
        </a>
        <div class="d-flex flex-column">
          <div class="fz-12 color-grey-blue text-uppercase">
            Сделка
          </div>
          <div class="d-flex align-items-center gap-10">
            <span class="fz-20 color-total-black">ID:</span>
            <span class="h4 mb-0 color-total-black header-copy-text" id="copy-link-11">1234567890</span>
            <button class="copyBtn tooltipEl" data-clipboard-target="#copy-link-11" data-bs-toggle="tooltip"
              title="Скопировано">
              <img src="@img/icons/copy-header.svg" alt="icon">
            </button>
          </div>
        </div>
      </div>


      <div class="pofileBtn position-relative">
        <button type="button" class="pofileBtnW d-flex gap-3 align-items-center">
          <img class="width-50 height-50 object-fit-cover rounded-circle" src="@img/admin/avatar/image-5.jpg"
            alt="image">
          <img src="@img/icons/select-arrow.svg" alt="icon">
        </button>

        <ul class="profile-submenu">
          <li>
            <a class="d-flex align-items-center gap-3" href="/underwriter-profile.html">
              <img src="@img/icons/profile-sm.svg" alt="icon">
              <span>Профиль</span>
            </a>
          </li>
          <li>
            <a class="d-flex align-items-center gap-3" href="#">
              <img src="@img/icons/logout.svg" alt="icon">
              <span>Выйти</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
