<header class="header-writer bg--white d-flex">
  <div class="sidebar-logo">
    <a href="#" class="header-writer-logo">
      <img src="@img/admin/logo/logo.svg" alt="logo">
    </a>
  </div>
  <div class="header-title">
    <div class="d-flex align-items-center justify-content-between gap-4 w-100">
      <div class="h3 mb-0">Мой профиль</div>

      <div class="d-flex gap-4 align-items-center">

        <div class="form-floating">
          <input type="search" class="formInput formInput--search rounded-25 form-control bg-white"
            placeholder="Поиск по моим заявкам">
          <label>Поиск по сайту</label>
          <button class="remove-text" type="button">
            <img src="@img/icons/remove.svg" alt="remove-text">
          </button>
        </div>
        <div class="pofileBtn position-relative">
          <button type="button" class="pofileBtnW d-flex gap-3 align-items-center">
            <img class="width-50 height-50 object-fit-cover rounded-circle" src="@img/admin/avatar/image-8.jpg"
              alt="image">
            <img src="@img/icons/select-arrow.svg" alt="icon">
          </button>

          <ul class="profile-submenu">
            <li>
              <a class="d-flex align-items-center gap-3" href="/underwriter-profile.html">
                <img src="@img/icons/profile-sm.svg" alt="icon">
                <span>Профиль</span>
              </a>
            </li>
            <li>
              <a class="d-flex align-items-center gap-3" href="#">
                <img src="@img/icons/logout.svg" alt="icon">
                <span>Выйти</span>
              </a>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</header>
