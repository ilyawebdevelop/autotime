<!-- modal -->
<!-- modalAnketaClient -->
<div class="modal rounded-60 p-40-32" id="modalAnketaClient">

  <h4 class="h4 text-center mb-2">
    Ссылка на&nbsp;анкету
    для клиента
  </h4>
  <button data-fancybox-close class="f-button is-close-btn" title="Close"><svg xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24" tabindex="-1">
      <path d="M20 20L4 4m16 0L4 20"></path>
    </svg>
  </button>

  <div class="modalContent">
    <p class="text-center fz-12 mb-32 color-grey">
      Отправьте реферальную ссылку покупателю, чтобы он мог самостоятельно заполнить анкету для создания заявки.
    </p>

    <div class="mb-32 form-floating">
      <input id="copy-link" type="tel" class="formInput form-control" placeholder="Телефон"
        value="https://автотайм.рф/?r=123456789">
      <label for="copy-link">Ссылка</label>
    </div>

    <button class="button button--yellow text-uppercase w-100 mb-12 copyBtn tooltipEl"
      data-clipboard-target="#copy-link" data-bs-toggle="tooltip" title="Скопировано" type="button">
      Скопировать
    </button>
    <button class="button button--transparent-grey text-uppercase w-100" type="button">
      <svg class="w-24 fill-black stroke-transparent">
        <use xlink:href="img/icons/icons.svg#send-btn"></use>
      </svg>
      отправить
    </button>

  </div>
</div>

@@include('modals/sellers.html',{})
@@include('modals/agents.html',{})
@@include('modals/managers.html',{})
@@include('modals/dir.html',{})
